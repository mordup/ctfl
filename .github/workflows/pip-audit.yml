name: pip-audit

on:
  push:
    branches: [main]
    paths:
      - "pyproject.toml"
      - ".github/workflows/pip-audit.yml"
  pull_request:
    paths:
      - "pyproject.toml"
      - ".github/workflows/pip-audit.yml"
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run pip-audit
        uses: pypa/gh-action-pip-audit@v1.1.0
        with:
          inputs: pyproject.toml
